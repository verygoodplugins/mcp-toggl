name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test-matrix:
    name: test (${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22", "24"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  test:
    name: test
    runs-on: ubuntu-latest
    needs: test-matrix
    steps:
      - run: echo "All matrix test jobs passed"
